<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="monospace" font-size="13">
  <rect width="960" height="700" fill="#111"/>
  
  <!-- Title -->
  <text x="480" y="30" fill="#ff6b35" font-size="16" text-anchor="middle" font-weight="bold">TELA 2 - DISCOGRAFIA</text>

  <!-- Browser frame -->
  <rect x="30" y="50" width="900" height="620" rx="8" fill="#0d0d0d" stroke="#444" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="30" y="50" width="900" height="50" rx="8" fill="#1a1a1a"/>
  <rect x="30" y="92" width="900" height="8" fill="#1a1a1a"/>
  <text x="60" y="82" fill="#ff6b35" font-size="15" font-weight="bold">METAL SETLIST BUILDER</text>
  <rect x="780" y="65" width="120" height="30" rx="4" fill="none" stroke="#444" stroke-width="1"/>
  <text x="806" y="84" fill="#888" font-size="12">My Setlists</text>

  <!-- Breadcrumb -->
  <text x="60" y="130" fill="#ff6b35" font-size="12">&#x2190; Back to search</text>

  <!-- Artist info -->
  <text x="60" y="165" fill="#e8e8e8" font-size="22" font-weight="bold">Megadeth</text>
  <text x="60" y="185" fill="#888" font-size="12">US  -  thrash metal, heavy metal  -  16 albums</text>

  <!-- Section label -->
  <text x="60" y="220" fill="#888" font-size="11" font-weight="bold" letter-spacing="1">ALBUMS</text>

  <!-- Annotation: API -->
  <line x1="150" y1="215" x2="300" y2="215" stroke="#ff6b35" stroke-dasharray="4" stroke-width="1"/>
  <text x="310" y="219" fill="#ff6b35" font-size="10">GET /api/artists/{id}/albums</text>

  <!-- Album grid - Row 1 -->
  <!-- Album 1 -->
  <rect x="60" y="235" width="155" height="200" rx="6" fill="#1a1a1a"/>
  <rect x="60" y="235" width="155" height="150" rx="6" fill="#2a2a2a"/>
  <text x="110" y="310" fill="#555" font-size="11" text-anchor="middle">[ cover ]</text>
  <text x="110" y="325" fill="#555" font-size="9" text-anchor="middle">1:1 aspect ratio</text>
  <text x="70" y="406" fill="#e8e8e8" font-size="11" font-weight="bold">Killing Is My</text>
  <text x="70" y="420" fill="#e8e8e8" font-size="11" font-weight="bold">Business</text>
  <text x="70" y="434" fill="#888" font-size="10">1985</text>

  <!-- Album 2 -->
  <rect x="230" y="235" width="155" height="200" rx="6" fill="#1a1a1a"/>
  <rect x="230" y="235" width="155" height="150" rx="6" fill="#2a2a2a"/>
  <text x="280" y="310" fill="#555" font-size="11" text-anchor="middle">[ cover ]</text>
  <text x="240" y="406" fill="#e8e8e8" font-size="11" font-weight="bold">Peace Sells</text>
  <text x="240" y="434" fill="#888" font-size="10">1986</text>

  <!-- Album 3 -->
  <rect x="400" y="235" width="155" height="200" rx="6" fill="#1a1a1a"/>
  <rect x="400" y="235" width="155" height="150" rx="6" fill="#2a2a2a"/>
  <text x="450" y="310" fill="#555" font-size="11" text-anchor="middle">[ cover ]</text>
  <text x="410" y="406" fill="#e8e8e8" font-size="11" font-weight="bold">So Far, So Good</text>
  <text x="410" y="434" fill="#888" font-size="10">1988</text>

  <!-- Album 4 (highlighted) -->
  <rect x="570" y="235" width="155" height="200" rx="6" fill="#1a1a1a" stroke="#ff6b35" stroke-width="2"/>
  <rect x="570" y="235" width="155" height="150" rx="6" fill="#2a2a2a"/>
  <text x="620" y="310" fill="#555" font-size="11" text-anchor="middle">[ cover ]</text>
  <text x="580" y="406" fill="#e8e8e8" font-size="11" font-weight="bold">Rust in Peace</text>
  <text x="580" y="434" fill="#888" font-size="10">1990</text>

  <!-- Album 5 -->
  <rect x="740" y="235" width="155" height="200" rx="6" fill="#1a1a1a"/>
  <rect x="740" y="235" width="155" height="150" rx="6" fill="#2a2a2a"/>
  <text x="790" y="310" fill="#555" font-size="11" text-anchor="middle">[ cover ]</text>
  <text x="750" y="406" fill="#e8e8e8" font-size="11" font-weight="bold">Countdown</text>
  <text x="750" y="434" fill="#888" font-size="10">1992</text>

  <!-- Album grid - Row 2 -->
  <!-- Album 6 -->
  <rect x="60" y="450" width="155" height="200" rx="6" fill="#1a1a1a"/>
  <rect x="60" y="450" width="155" height="150" rx="6" fill="#2a2a2a"/>
  <text x="110" y="525" fill="#555" font-size="11" text-anchor="middle">[ cover ]</text>
  <text x="70" y="621" fill="#e8e8e8" font-size="11" font-weight="bold">Youthanasia</text>
  <text x="70" y="635" fill="#888" font-size="10">1994</text>

  <!-- Album 7 -->
  <rect x="230" y="450" width="155" height="200" rx="6" fill="#1a1a1a"/>
  <rect x="230" y="450" width="155" height="150" rx="6" fill="#2a2a2a"/>
  <text x="280" y="525" fill="#555" font-size="11" text-anchor="middle">[ cover ]</text>
  <text x="240" y="621" fill="#e8e8e8" font-size="11" font-weight="bold">Cryptic Writings</text>
  <text x="240" y="635" fill="#888" font-size="10">1997</text>

  <!-- Annotations -->
  <!-- Cover art source -->
  <line x1="137" y1="310" x2="137" y2="340" stroke="#ff6b35" stroke-dasharray="4" stroke-width="1"/>
  <line x1="137" y1="340" x2="300" y2="340" stroke="#ff6b35" stroke-dasharray="4" stroke-width="1"/>
  <text x="310" y="337" fill="#ff6b35" font-size="10">img src: coverartarchive.org/</text>
  <text x="310" y="350" fill="#ff6b35" font-size="10">release-group/{id}/front-500</text>

  <!-- Click action -->
  <line x1="647" y1="440" x2="647" y2="470" stroke="#ff6b35" stroke-dasharray="4" stroke-width="1"/>
  <line x1="647" y1="470" x2="750" y2="470" stroke="#ff6b35" stroke-dasharray="4" stroke-width="1"/>
  <text x="760" y="467" fill="#ff6b35" font-size="10">click abre Tela 3</text>
  <text x="760" y="480" fill="#ff6b35" font-size="10">(setlist builder)</text>

  <!-- Hover state annotation -->
  <line x1="725" y1="280" x2="780" y2="250" stroke="#ff6b35" stroke-dasharray="4" stroke-width="1"/>
  <text x="790" y="248" fill="#ff6b35" font-size="10">hover: borda accent</text>
  <text x="790" y="261" fill="#ff6b35" font-size="10">+ scale(1.03)</text>
</svg>
